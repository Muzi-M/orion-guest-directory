<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Guest Directory</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.jpg" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="background-container">
      <div class="overlay"></div>
    </div>
    <div class="container text-center">
      <a href="https://orionhotels.co.za/" target="_blank">
        <img
          src="images/orion-hotels-logo.png"
          alt="Orion Hotels & Resorts Logo"
          class="logo my-4"
        />
      </a>
      <h2 id="hotel-name">[HOTEL NAME] GUEST DIRECTORY</h2>
      <div class="list-group mt-4">
        <a
          href="welcome.html?hotel=ditholo-game-lodge"
          id="welcome-link"
          class="list-group-item list-group-item-action"
          >WELCOME TO <span id="hotel-name-link">Ditholo Game Lodge</span></a
        >

        <!-- Link to trigger the gallery -->
        <a
          href="#"
          id="food-drinks-link"
          class="list-group-item list-group-item-action"
          onclick="showMenuPopup(); return false;"
          >FOOD & DRINKS</a
        >

        <a
          href="hotel-rooms-amenities.html?hotel=ditholo-game-lodge"
          id="rooms-amenities-link"
          class="list-group-item list-group-item-action"
          >HOTEL ROOMS & AMENITIES</a
        >
        <a
          href="nearby-attractions.html?hotel=ditholo-game-lodge"
          id="attractions-link"
          class="list-group-item list-group-item-action"
          >NEARBY ATTRACTIONS</a
        >
        <a
          href="house-rules-safety.html?hotel=ditholo-game-lodge"
          id="rules-safety-link"
          class="list-group-item list-group-item-action"
          >HOUSE RULES & SAFETY</a
        >
        <a
          href=""
          target="_blank"
          id="review-link"
          class="list-group-item list-group-item-action"
          >PLEASE REVIEW US</a
        >
        <a href="#" id="whatsapp-link" class="whatsapp-float" target="_blank">
          <img src="images/whatsapp-icon.png" alt="WhatsApp" />
        </a>
      </div>
    </div>

    <!-- Popup Overlay for Image Gallery -->
    <div id="imagePopup" class="popup-overlay" onclick="closePopup()">
      <span class="close-popup" onclick="closePopup()">×</span>
      <img id="popupImage" class="popup-image" />
      <button class="prev-btn" onclick="showPrev(event)">&#10094;</button>
      <button class="next-btn" onclick="showNext(event)">&#10095;</button>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
